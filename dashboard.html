<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="dashboard_styles.css">
        <title>Dashboard</title>
    </head>
    <body>
        <div class="header">
            <img src="Images/logo-full.svg" id="header-icon">
        </div>
        <div class="body-no-header">
            <img src="Images/logo.svg" id="dashboard-icon">
            <h1 id="welcome_text">Welcome, Ninja!</h1>
            <div id="main_body" class="layer_1">
                <div id="profile">
                    <div id="stats" class="layer_2">
                        <h2>Your Info</h2>
                        <p id="ninja_name_display">Name: </p>
                        <p id="ninja_points_display">Points: </p>
                    </div>
                    <div id="options" class="layer_2">
                        <h2>Options</h2>
                        <button id="transfer_belt_button" class="full_width_button danger_button">TRANSFER BELT</button>
                    </div>
                </div>
                <div id="shop" class="layer_2">
                    <h2>Shop</h2>
                </div>
            </div>
        </div>

        <script type="module" src="dashboard_app.js"></script>
    </body>
</html>
