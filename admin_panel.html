<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Admin Panel</title>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="admin_styles.css">
    </head>
    <body>
        <div class="sidebar">
            <img src="/Images/logo-full.svg" alt="Code Ninjas" id="sidebar_top_logo">
            <button id="sidebar_home_button"><img src="/Images/HomeIcon.svg" class="sidebar_icon">Home</button>
            <button id="sidebar_ninjas_button"><img src="/Images/logo.svg" class="sidebar_icon">Ninjas</button>
            <button id="sidebar_settings_button"><img src="/Images/GearIcon.svg" class="sidebar_icon">Settings</button>
        </div>
        <div class="right_side">
            <div class="top_bar">
                <h1 id="navbar_header">Home</h1>
            </div>
            <div class="main_content">
                <div id="home_container" class="content_view active_view">
                    <h2>Home</h2>
                </div>
                <div id="ninja_container" class="content_view">
                    <h2>Registered Ninjas</h2>
                    <div id="ninja_grid_container"></div>
                </div>
                <div id="settings_container" class="content_view">
                    <h2>Settings</h2>
                    <h2>Shop Items</h2>
                    <div id="shop_editor_container"></div>
                    <button id="add_shop_item_button">Add New Shop Item +</button>
                    <h2>Leaderboards</h2>
                    <div id="leaderboards_editor_container"></div>
                    <button id="add_leaderboard_button">Add Leaderboard +</button>
                </div>
                <div id="single_ninja_view" class="content_view">
                    <div class="ninja_tab_bar">
                        <button id="ninja_stats_button">Stats</button>
                        <button id="ninja_sessions_button">Sessions</button>
                        <button id="ninja_purchases_button">Purchases</button>
                    </div>
                    <div id="single_ninja_stats" class="active_ninja_tab">
                        <h2 class="ninja_title">Name's Stats</h2>
                        <p class="ninja_belt">White Belt</p>
                        <p class="ninja_points">Current Points: </p>
                        <p class="ninja_uid">UID: </p>
                        <p class="ninja_nfc_id">NFC ID: </p>
                        <p class="ninja_history_points">Points in History: </p>
                        <div class="button_bar">
                            <button id="single_ninja_custom_points">ADD CUSTOM POINTS</button>
                            <button id="single_ninja_manual_login">LOG IN AS NINJA</button>
                            <button id="remove_single_ninja" class="danger_button">REMOVE NINJA</button>
                        </div>
                    </div>
                    <div id="single_ninja_sessions">
                        <h2 class="ninja_title">Name's Sessions</h2>
                        <div id="ninja_sessions_container">
                            <div class="ninja_session">
                                <h3>April 4, 2026</h3>
                                <p>Total Points: 40</p>
                                <p>Good Behaviour Points: 10</p>
                                <p>Custom Points: 30</p>
                            </div>
                        </div>
                        <div class="button_bar">
                            <button id="single_ninja_add_session">ADD SESSION</button>
                        </div>
                    </div>
                    <div id="single_ninja_purchases">
                        <h2 class="ninja_title">Name's Purchases</h2>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="admin.js"></script>
    </body>
</html>

<!-- 
Admin panel needs:
- container for ninjas info with id #ninja_container
- all ninjas in the contianer have class .registered_ninja
    - ninja name has .ninja_name
    - points has .ninja_points
    - uid has .ninja_uid
- #shop_editor_container to hold the shop editor
- all shop items in the contianer have class .shop_item
    - item name has .shop_item_name
    - cost has .shop_item_cost
    - description has .shop_item_description
- #leaderboard_slots_input for the input to input leaderboard slots
- #add_shop_item_button for the button that opens a popup

settings needed:
leaderboard posistions
shop editor
-->
