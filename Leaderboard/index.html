<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles.css">
        <link rel="stylesheet" href="leaderboard_styles.css">
        <link rel="icon" type="image/x-icon" href="../Images/logo.svg">
        <title>Leaderboard</title>
    </head>
    <body class="leaderboard-body">
        <div class="header" id="leaderboard-header">
            <img src="../Images/logo-full.svg" id="header-icon">
        </div>
        <h1>Leaderboard</h1>
        <div id="body-no-header"> 
            <div id="left-container">
                <div id="top_left_leaderboard_container" class="small_leaderboad_container"></div>
                <div id="bottom_left_leaderboard_container" class="small_leaderboad_container"></div>
            </div>

            <div id="middle-container">
                <div id="main_leaderboard_container" class="big_leaderboad_container"></div>
            </div>
            
            <div id="right-container">
                <div id="top_right_leaderboard_container" class="small_leaderboad_container"></div>
                <div id="bottom_right_leaderboard_container" class="small_leaderboad_container"></div>
            </div>
        </div>

        <script type="module" src="leaderboard_app.js"></script>
    </body>
</html>
